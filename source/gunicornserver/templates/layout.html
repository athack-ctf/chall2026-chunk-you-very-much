<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <link rel="stylesheet" href="/styles/style.css" />
</head>

<body>
  <canvas id="fire-bg" aria-hidden="true"></canvas>

  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <div class="logo">👽</div>
        <div>
          <div class="brand-title">Transmission Hub</div>
          <div class="brand-sub">Interstellar relay</div>
        </div>
      </div>

      <div class="topbar-actions">
        <span class="chip chip-status">STATUS: ONLINE</span>
        <span class="chip chip-sponsor" id="sponsor-pill">POWERED BY: INTERAC</span>
      </div>
    </header>

    <main class="main">
      {{content}}
    </main>

    <footer class="footer">
      <span>Iridum Relay Node • Do not trust the proxy.</span>
    </footer>
  </div>


  <script>
  (() => {
    const canvas = document.getElementById("fire-bg");
    if (!canvas) return;

    const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (prefersReduced) return;

    const ctx = canvas.getContext("2d", { alpha: true, desynchronized: true });
    if (!ctx) return;

    const MAX_DPR = 2;
    const MAX_PARTICLES = 1200;

    const logoImg = new Image();
    logoImg.src = "/styles/interac_logo.png";

    let w = 0, h = 0, dpr = 1;
    let washGradient = null;
    let vignetteGradient = null;

    const logos = [];
    const particles = [];
    const rand = (a, b) => Math.random() * (b - a) + a;

  
    const particleSprite = document.createElement("canvas");
    particleSprite.width = 64;
    particleSprite.height = 64;
    const sctx = particleSprite.getContext("2d");
    if (!sctx) return;

    (function buildParticleSprite() {
      const cx = 32, cy = 32, r = 28;
      const g = sctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0.00, "rgba(255,250,225,1)");
      g.addColorStop(0.18, "rgba(255,225,135,0.85)");
      g.addColorStop(0.42, "rgba(240,181,28,0.70)");
      g.addColorStop(0.70, "rgba(210,75,24,0.35)");
      g.addColorStop(0.86, "rgba(122,60,255,0.22)");
      g.addColorStop(0.95, "rgba(95,124,255,0.12)");
      g.addColorStop(1.00, "rgba(0,0,0,0)");
      sctx.fillStyle = g;
      sctx.beginPath();
      sctx.arc(cx, cy, r, 0, Math.PI * 2);
      sctx.fill();
    })();

    function resize() {
      dpr = Math.min(MAX_DPR, Math.max(1, window.devicePixelRatio || 1));
      w = window.innerWidth;
      h = window.innerHeight;

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    
      washGradient = ctx.createLinearGradient(0, 0, 0, h);
      washGradient.addColorStop(0.00, "rgba(122,60,255,0.07)");
      washGradient.addColorStop(0.45, "rgba(95,124,255,0.05)");
      washGradient.addColorStop(1.00, "rgba(57,255,20,0.025)");

      vignetteGradient = ctx.createRadialGradient(
        w * 0.5, h * 0.45, h * 0.14,
        w * 0.5, h * 0.45, h * 0.95
      );
      vignetteGradient.addColorStop(0, "rgba(0,0,0,0)");
      vignetteGradient.addColorStop(1, "rgba(5,8,18,0.09)");
    }

    resize();
    window.addEventListener("resize", resize);

    function spawnLogoMeteor() {
      const fromLeft = Math.random() < 0.5;

      const x = fromLeft ? rand(-60, w * 0.32) : rand(w * 0.68, w + 60);
      const y = rand(-100, h * 0.18);

      const vx = fromLeft ? rand(55, 110) : rand(-110, -55);
      const vy = rand(230, 310);

      logos.push({
        x, y, vx, vy,
        size: rand(30, 46),
        rot: rand(-0.35, 0.35),
        rotSpeed: rand(-0.18, 0.18),
        alpha: rand(0.55, 0.80)
      });
    }

    function emitFire(logo) {
      const speed = Math.hypot(logo.vx, logo.vy) || 1;
      const ux = logo.vx / speed;
      const uy = logo.vy / speed;

      const tailX = logo.x - ux * (logo.size * 0.34);
      const tailY = logo.y - uy * (logo.size * 0.34);

      const count = (rand(2, 4) | 0);
      for (let i = 0; i < count; i++) {
        const spread = rand(-0.65, 0.65);
        const backSpeed = rand(70, 145);

        const px = -uy;
        const py = ux;

        const p = {
          x: tailX + px * rand(-3, 3),
          y: tailY + py * rand(-3, 3),
          vx: -ux * backSpeed + px * spread * 42 + rand(-10, 10),
          vy: -uy * backSpeed + py * spread * 42 + rand(-10, 10),
          life: rand(0.20, 0.34),
          maxLife: 0,
          r: rand(4, 9),
          heat: rand(0.65, 0.95)
        };
        p.maxLife = p.life;
        particles.push(p);
      }

      if (Math.random() < 0.45) {
        const s = {
          x: tailX,
          y: tailY,
          vx: -ux * rand(120, 190) + rand(-22, 22),
          vy: -uy * rand(120, 190) + rand(-22, 22),
          life: rand(0.14, 0.22),
          maxLife: 0,
          r: rand(1.5, 3.2),
          heat: 1.0
        };
        s.maxLife = s.life;
        particles.push(s);
      }
    }

    function update(dt) {
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnLogoMeteor();
        spawnTimer = rand(0.55, 1.00);
      }

      for (let i = logos.length - 1; i >= 0; i--) {
        const L = logos[i];
        L.x += L.vx * dt;
        L.y += L.vy * dt;
        L.rot += L.rotSpeed * dt;

        emitFire(L);

        if (L.y > h + 120 || L.x < -140 || L.x > w + 140) {
          logos.splice(i, 1);
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }

        p.vx *= 0.987;
        p.vy *= 0.987;
        p.vy -= 13 * dt;

        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.r += 8 * dt;
      }

      if (particles.length > MAX_PARTICLES) {
        particles.splice(0, particles.length - MAX_PARTICLES);
      }
    }

    function drawParticle(p) {
      const t = p.life / p.maxLife;
      const a = 0.30 * t * p.heat;

      ctx.globalAlpha = a;
      const r = p.r;
      ctx.drawImage(particleSprite, p.x - r, p.y - r, r * 2, r * 2);
      ctx.globalAlpha = 1;
    }

    function drawLogo(L) {
 
      const glow = ctx.createRadialGradient(L.x, L.y, 0, L.x, L.y, L.size * 1.05);
      glow.addColorStop(0, "rgba(240,181,28,0.08)");
      glow.addColorStop(0.55, "rgba(240,181,28,0.04)");
      glow.addColorStop(1, "rgba(240,181,28,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(L.x, L.y, L.size * 0.75, 0, Math.PI * 2);
      ctx.fill();

    
      const speed = Math.hypot(L.vx, L.vy) || 1;
      const ux = L.vx / speed;
      const uy = L.vy / speed;

      ctx.strokeStyle = "rgba(240,181,28,0.10)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(L.x - ux * (L.size * 1.35), L.y - uy * (L.size * 1.35));
      ctx.lineTo(L.x - ux * (L.size * 0.18), L.y - uy * (L.size * 0.18));
      ctx.stroke();

     
      if (logoImg.complete && logoImg.naturalWidth) {
        ctx.save();
        ctx.translate(L.x, L.y);
        ctx.rotate(L.rot);

        ctx.globalAlpha = L.alpha * 0.78;
        ctx.filter = "saturate(0.88) brightness(1.02)";
        ctx.shadowColor = "rgba(240,181,28,0.18)";
        ctx.shadowBlur = 7;

        ctx.drawImage(logoImg, -L.size / 2, -L.size / 2, L.size, L.size);
        ctx.restore();

        ctx.globalAlpha = 1;
        ctx.filter = "none";
        ctx.shadowBlur = 0;
      }
    }

    let last = performance.now();
    let spawnTimer = 0.25;

    let running = true;
    document.addEventListener("visibilitychange", () => {
      running = !document.hidden;
    });

    function frame(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;

      if (!running) {
        requestAnimationFrame(frame);
        return;
      }

  
      ctx.save();
      ctx.globalCompositeOperation = "destination-out";
      ctx.fillStyle = "rgba(0,0,0,0.22)";
      ctx.fillRect(0, 0, w, h);
      ctx.restore();

      update(dt);

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (let i = 0; i < particles.length; i++) drawParticle(particles[i]);
      ctx.restore();

   
      for (let i = 0; i < logos.length; i++) drawLogo(logos[i]);


      if (washGradient) {
        ctx.save();
        ctx.globalCompositeOperation = "soft-light";
        ctx.fillStyle = washGradient;
        ctx.fillRect(0, 0, w, h);
        ctx.restore();
      }

   
      if (vignetteGradient) {
        ctx.save();
        ctx.fillStyle = vignetteGradient;
        ctx.fillRect(0, 0, w, h);
        ctx.restore();
      }

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  })();
  </script>


  <script>
  (() => {
    const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const target = document.getElementById("sponsor-pill");
    if (!target || prefersReduced) return;

    const RUN_ONCE = false;
    if (RUN_ONCE) {
      if (sessionStorage.getItem("interacPillIntroSeen") === "1") return;
      sessionStorage.setItem("interacPillIntroSeen", "1");
    }

    const FADE_IN_MS = 240;
    const HOLD_MS = 1000;
    const TRAVEL_MS = 1100;
    const START_SCALE = 3.5;

    function runSponsorIntro() {
      const rect = target.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      target.classList.add("sponsor-pill-hidden");

      const blur = document.createElement("div");
      blur.className = "sponsor-intro-blur";
      document.body.appendChild(blur);

      const clone = target.cloneNode(true);
      clone.removeAttribute("id");
      clone.classList.add("sponsor-pill-fly");
      clone.classList.remove("sponsor-pill-hidden");
      document.body.appendChild(clone);

      clone.style.width = `${rect.width}px`;
      clone.style.height = `${rect.height}px`;
      clone.style.left = `${rect.left}px`;
      clone.style.top = `${rect.top}px`;

      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const tx = cx - (rect.left + rect.width / 2);
      const ty = cy - (rect.top + rect.height / 2);

      clone.style.transform = `translate3d(${tx}px, ${ty}px, 0) scale(${START_SCALE})`;
      clone.style.opacity = "0";
      clone.style.boxShadow =
        "inset 0 0 0 1px rgba(240,181,28,0.14), 0 0 30px rgba(240,181,28,0.20)";

      clone.getBoundingClientRect();

      requestAnimationFrame(() => {
        blur.style.opacity = "1";
        clone.style.transition = `opacity ${FADE_IN_MS}ms ease-out`;
        clone.style.opacity = "1";
      });

      setTimeout(() => {
        blur.style.opacity = "0";
        clone.style.transition = [
          `transform ${TRAVEL_MS}ms cubic-bezier(0.20, 0.90, 0.20, 1.00)`,
          `opacity ${TRAVEL_MS}ms ease`,
          `box-shadow ${TRAVEL_MS}ms ease`
        ].join(", ");

        clone.style.transform = "translate3d(0,0,0) scale(1)";
        clone.style.opacity = "0.98";
        clone.style.boxShadow =
          "inset 0 0 0 1px rgba(240,181,28,0.08), 0 0 10px rgba(240,181,28,0.08)";
      }, FADE_IN_MS + HOLD_MS);

      setTimeout(() => {
        target.classList.remove("sponsor-pill-hidden");
        clone.remove();
        blur.remove();
      }, FADE_IN_MS + HOLD_MS + TRAVEL_MS + 50);
    }

    window.addEventListener("load", () => {
      setTimeout(runSponsorIntro, 120);
    }, { once: true });
  })();
  </script>
</body>
</html>
