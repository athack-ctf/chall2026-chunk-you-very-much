<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/meteor_shower.js" defer></script>
  <script src="/static/interac_intro.js" defer></script>
</head>

<body>
  <canvas id="fire-bg" aria-hidden="true"></canvas>

  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <div class="logo">👽</div>
        <div>
          <div class="brand-title">Transmission Hub</div>
          <div class="brand-sub">Interstellar relay</div>
        </div>
      </div>

      <div class="topbar-actions">
        <span class="chip chip-status">STATUS: ONLINE</span>
        <span class="chip chip-sponsor" id="sponsor-pill">POWERED BY: INTERAC</span>
      </div>
    </header>

    <main class="main">
      {{content}}
    </main>

    <footer class="footer">
      <span>Iridum Relay Node • Do not trust the proxy.</span>
    </footer>
  </div>
</body>
</html>
